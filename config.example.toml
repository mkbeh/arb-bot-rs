# TOML configuration for the arbitrage bot.

[general]
# Application server address.
server_addr = "127.0.0.1:9000"

# Metrics server address (for Prometheus).
metrics_addr = "127.0.0.1:9007"

[binance]
# Binance REST API base URL.
api_url = "https://api.binance.com"

# API key and secret (replace placeholders).
api_token = "<api_token>"
api_secret_key = "<api_secret_key>"

# WebSocket URLs.
ws_url = "wss://ws-api.binance.com:443/ws-api/v3"
ws_streams_url = "wss://stream.binance.com:443"

# Websocket Streams connections limit.
ws_max_connections = 50

# Exchange fee percentage. Check your account settings.
fee_percent = 0.075

# API request weight limit per minute.
api_weight_limit = 5000

# Error retry timeout in seconds.
error_timeout = 30

# Enable real order placement (false for dry-run simulation).
send_orders = false

# Minimum profit threshold in USD (supports negative for loss tolerance).
min_profit_qty = 0.1

# Maximum order quantity in USD.
max_order_qty = 500

# Minimum 24h trading volume for ticker validation (0 = no limit).
min_ticker_qty_24h = 0

# List of assets to skip during symbol filtering and sorting (e.g., for avoiding high-volatility or restricted pairs).
# Example: ["BTC", "ETH"] — will exclude any symbols where base_asset or quote_asset matches these (case-sensitive).
# Empty array = no skips.
# Default: [] (no assets skipped).
skip_assets = []

# Asset list: base assets for arbitrage chains.
# IMPORTANT: 'symbol' must be a REAL trading pair on the exchange.
[[binance.assets]]
asset = "BTC"
min_profit_qty = 0
max_order_qty = 0
min_ticker_qty_24h = 0
symbol = "BTCUSDT"

[[binance.assets]]
asset = "USDT"
min_profit_qty = 0
max_order_qty = 0
min_ticker_qty_24h = 0

[[binance.assets]]
asset = "JPY"
min_profit_qty = 400
max_order_qty = 4500
min_ticker_qty_24h = 0

[kucoin]
# KuCoin REST API base URL.
api_url = "https://api.kucoin.com"

# API credentials (replace placeholders).
api_token = "<api_token>"
api_secret_key = "<api_secret_key>"
api_passphrase = "<api_passphrase>"

# Private WebSocket URL.
ws_private_url = "wss://wsapi.kucoin.com/v1/private"

# Exchange fee percentage. Check your account settings.
fee_percent = 0.08

# API request weight limit per minute.
api_weight_limit = 5000

# Error retry timeout in seconds.
error_timeout = 30

# Enable real order placement (false for dry-run simulation).
send_orders = false

# Minimum profit threshold in USD (supports negative for loss tolerance).
min_profit_qty = 0.1

# Maximum order quantity in USD.
max_order_qty = 500

# Minimum 24h trading volume for ticker validation (0 = no limit).
min_ticker_qty_24h = 0

# List of assets to skip during symbol filtering and sorting (e.g., for avoiding high-volatility or restricted pairs).
# Example: ["BTC", "ETH"] — will exclude any symbols where base_asset or quote_asset matches these (case-sensitive).
# Empty array = no skips.
# Default: [] (no assets skipped).
skip_assets = []

# Asset list: base assets for arbitrage chains.
# IMPORTANT: 'symbol' must be a REAL trading pair on the exchange.
[[kucoin.assets]]
asset = "BTC"
min_profit_qty = 0
max_order_qty = 0
min_ticker_qty_24h = 0
symbol = "BTC-USDT"

[[kucoin.assets]]
asset = "USDT"
min_profit_qty = 0
max_order_qty = 0
min_ticker_qty_24h = 0

[[kucoin.assets]]
asset = "ETH"
min_profit_qty = 0
max_order_qty = 0
min_ticker_qty_24h = 0
symbol = "ETH-USDT"

[solana]
# Solana RPC endpoint.
rpc_endpoint = "https://api.mainnet-beta.solana.com"

# [System] The maximum number of gRPC messages to accumulate in a single processing burst.
# This parameter applies to both gRPC and WebSocket transports.
stream_batch_size = 128
# [System] The microsecond-grade duration to wait for additional messages after the first one arrives in the stream.
# This is a low-level tuning parameter for gRPC/WebSocket streams. After receiving
# the first message, the engine will wait this many microseconds to "drain"
# already arrived packets from the network stack.
stream_wait_timeout_us = 500

# The radius of the liquidity sliding window (number of adjacent arrays to cache).
## A value of 1 means the bot will store the active array plus 1 array
## on each side of the current price (Total: 3 arrays per pool).
liquidity_depth = 1

[solana.transport]
# Type of transport for connecting to Solana RPC.
# Possible values:
# - "websocket"
# - "grpc": low-latency streams via Yellowstone
type = "websocket"

# WebSocket URL / gRPC endpoint
url = "wss://<YOUR_URL>"

# X-Token (or API key): For authentication in private gRPC
# x_token = ""

